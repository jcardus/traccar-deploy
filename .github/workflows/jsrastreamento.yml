name: Deploy JSRastreamento

on:
  workflow_dispatch:
    inputs:
      server_name:
        description: Server name
        default: traccar-jsrastreamento
      server_type:
        description: Hetzner server type
        default: cx23
      location:
        description: Hetzner location
        default: nbg1

jobs:
  build-image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: 'jcardus/traccar'
          ref: 'jsrastreamento'
          path: traccar-src
          fetch-depth: 0
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: ./gradlew build
        working-directory: traccar-src

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: traccar-src/traccar-web/package-lock.json

      - run: npm ci && npm run build
        working-directory: traccar-src/traccar-web

      - name: Install packaging tools
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libgcc-s1:i386 libstdc++6:i386
          sudo apt-get install -y innoextract makeself wine32

      - name: Download JDKs and package
        working-directory: traccar-src/setup
        run: |
          JDK_VERSION="21.0.7+6"
          JDK_BASE="https://github.com/adoptium/temurin21-binaries/releases/download/jdk-${JDK_VERSION}"
          wget -q "$JDK_BASE/OpenJDK21U-jdk_x64_linux_hotspot_${JDK_VERSION/+/_}.tar.gz"
          wget -q "$JDK_BASE/OpenJDK21U-jdk_aarch64_linux_hotspot_${JDK_VERSION/+/_}.tar.gz"
          wget -q "$JDK_BASE/OpenJDK21U-jdk_x64_windows_hotspot_${JDK_VERSION/+/_}.zip"
          wget -q http://files.jrsoftware.org/is/5/isetup-5.5.6.exe
          ./package.sh preview

      - name: Prepare Docker context
        run: |
          mkdir -p docker-context/installers
          cp traccar-src/setup/traccar-other-preview.zip docker-context/installers/
          cp -v traccar-src/docker/Dockerfile.ubuntu docker-context/Dockerfile

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: docker-context/Dockerfile
          build-args: VERSION=preview
          push: true
          tags: ghcr.io/jcardus/traccar:jsrastreamento
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Create Hetzner server
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install hcloud CLI
        run: |
          curl -fsSL https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz \
            | tar -xz hcloud
          sudo mv hcloud /usr/local/bin/

      - name: Create server
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SERVER_NAME: ${{ github.event.inputs.server_name }}
          SERVER_TYPE: ${{ github.event.inputs.server_type }}
          LOCATION: ${{ github.event.inputs.location }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          SMTP_USER_NAME: ${{ secrets.SMTP_USER_NAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_SMTP_FROM: ${{ secrets.MAIL_SMTP_FROM }}
          NOTIFICATOR_FIREBASE_SERVICE_ACCOUNT: ${{ secrets.NOTIFICATOR_FIREBASE_SERVICE_ACCOUNT }}
          SMS_HTTP_AUTHORIZATION: ${{ secrets.SMS_HTTP_AUTHORIZATION }}
          GEOLOCATION_KEY: ${{ secrets.GEOLOCATION_KEY }}
        run: bash hcloud-create.sh
