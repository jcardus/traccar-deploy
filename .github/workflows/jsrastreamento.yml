name: Deploy JSRastreamento

on:
  workflow_dispatch:
    inputs:
      server_name:
        description: Server name
        default: traccar-jsrastreamento
      server_type:
        description: Hetzner server type
        default: cx23
      location:
        description: Hetzner location
        default: nbg1

jobs:
  deploy:
    name: Create Hetzner server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install hcloud CLI
        run: |
          curl -fsSL https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz \
            | tar -xz hcloud
          sudo mv hcloud /usr/local/bin/

      - name: Create server
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SERVER_NAME: ${{ github.event.inputs.server_name }}
          SERVER_TYPE: ${{ github.event.inputs.server_type }}
          LOCATION: ${{ github.event.inputs.location }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          SMTP_USER_NAME: ${{ secrets.SMTP_USER_NAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_SMTP_FROM: ${{ secrets.MAIL_SMTP_FROM }}
          NOTIFICATOR_FIREBASE_SERVICE_ACCOUNT: ${{ secrets.NOTIFICATOR_FIREBASE_SERVICE_ACCOUNT }}
          SMS_HTTP_AUTHORIZATION: ${{ secrets.SMS_HTTP_AUTHORIZATION }}
          GEOLOCATION_KEY: ${{ secrets.GEOLOCATION_KEY }}
        run: bash hcloud-create.sh
