#cloud-config

write_files:
  - path: /opt/traccar/docker-compose.yml
    content: |
      services:

        traccar:
          image: traccar/traccar:latest
          restart: unless-stopped
          environment:
            CONFIG_USE_ENVIRONMENT_VARIABLES: "true"
            DATABASE_DRIVER: org.postgresql.Driver
            DATABASE_URL: ${DATABASE_URL}
            DATABASE_USER: ${DATABASE_USER}
            DATABASE_PASSWORD: ${DATABASE_PASSWORD}
          healthcheck:
            test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8082/api/health" ]
            interval: 2m
            timeout: 5s
            start_period: 1h
            retries: 3
          ports:
            - "8082:8082"
            - "5000-5500:5000-5500"
          volumes:
            - /opt/traccar/logs:/opt/traccar/logs

        autoheal:
          image: willfarrell/autoheal:latest
          restart: always
          environment:
            AUTOHEAL_CONTAINER_LABEL: all
            AUTOHEAL_INTERVAL: 60
            AUTOHEAL_START_PERIOD: 3600
          volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro

        watchtower:
          image: containrrr/watchtower:latest
          restart: always
          environment:
            WATCHTOWER_CLEANUP: "true"
            WATCHTOWER_SCHEDULE: "0 */30 * * * *"
          volumes:
            - /var/run/docker.sock:/var/run/docker.sock

runcmd:
  - mkdir -p /opt/traccar/logs
  - cd /opt/traccar && docker compose up -d
